<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Purfle Dashboard</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<header class="header">
    <h1><span>Purfle</span> Dashboard</h1>
    <div class="connection-status">
        <span class="connection-dot" id="connection-dot"></span>
        <span id="connection-label">Connecting...</span>
    </div>
</header>

<div class="main">
    <div class="agent-list">
        <div class="stats-bar">
            <div class="stat">
                <span class="stat-value" id="stat-total">0</span>
                <span class="stat-label">Total</span>
            </div>
            <div class="stat">
                <span class="stat-value" id="stat-running" style="color: var(--green)">0</span>
                <span class="stat-label">Running</span>
            </div>
            <div class="stat">
                <span class="stat-value" id="stat-stopped" style="color: var(--text-secondary)">0</span>
                <span class="stat-label">Stopped</span>
            </div>
            <div class="stat">
                <span class="stat-value" id="stat-error" style="color: var(--red)">0</span>
                <span class="stat-label">Error</span>
            </div>
        </div>
        <div class="agent-grid" id="agent-grid">
            <!-- Rendered by JS -->
        </div>
    </div>

    <div class="detail-panel hidden" id="detail-panel">
        <div class="empty-detail">Select an agent to view details</div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.7/signalr.min.js"
        integrity="sha512-7SRCYIJtR6F4EvIW7gB1GjIROSY3TPBST2Xn3Cv8HkBfiu1MIdaS6MhEVJnk4FnhOA7Kdo0Lbn9wbipTA25NA=="
        crossorigin="anonymous"
        referrerpolicy="no-referrer"></script>
<script src="/js/app.js"></script>

</body>
</html>
