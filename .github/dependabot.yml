version: 2

updates:
  # Runtime (.NET)
  - package-ecosystem: nuget
    directory: /runtime
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - dotnet

  # SDK (npm)
  - package-ecosystem: npm
    directory: /sdk
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - npm

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci
