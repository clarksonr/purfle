version: 2

updates:
  # Runtime (.NET)
  - package-ecosystem: nuget
    directory: /runtime
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - dotnet

  # Dashboard (.NET)
