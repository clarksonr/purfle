name: Release

on:
  push:
    tags:
      - "v*"

env:
  DOTNET_VERSION: "10.0.x"
  NODE_VERSION: "24"
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

permissions:
  contents: write

jobs:
  build-runtime:
    name: Build Runtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          include-prerelease: true

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-runtime-${{ hashFiles('runtime/**/*.csproj') }}
          restore-keys: nuget-runtime-

      - name: Build
        run: dotnet build runtime/Purfle.Runtime.slnx --configuration Release

      - name: Test
        run: dotnet test runtime/Purfle.Runtime.slnx --configuration Release --verbosity normal

      - name: Publish
        run: dotnet publish runtime/src/Purfle.Runtime.Host/Purfle.Runtime.Host.csproj --configuration Release --output ./artifacts/runtime

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: runtime
          path: ./artifacts/runtime

  build-sdk:
    name: Build SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: sdk/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: sdk

      - name: Build
        run: npm run build
        working-directory: sdk

      - name: Test
        run: npm test
        working-directory: sdk

      - name: Pack CLI
        run: npm pack
        working-directory: sdk/packages/cli

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-cli
          path: sdk/packages/cli/*.tgz

  build-dashboard:
    name: Build Dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          include-prerelease: true

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-dashboard-${{ hashFiles('dashboard/**/*.csproj') }}
          restore-keys: nuget-dashboard-

      - name: Publish
        run: dotnet publish dashboard/src/Purfle.Dashboard.Api/Purfle.Dashboard.Api.csproj --configuration Release --output ./artifacts/dashboard

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard
          path: ./artifacts/dashboard

  build-macos:
    name: Build macOS App
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          include-prerelease: true

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Publish Mac Catalyst
        run: >
          dotnet publish app/src/Purfle.App/Purfle.App.csproj
          -f net10.0-maccatalyst
          --configuration Release
          -p:CreatePackage=true
          --output ./artifacts/macos

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          PKG=$(find ./artifacts/macos -name "*.pkg" -o -name "*.dmg" | head -1)
          if [ -z "$PKG" ]; then
            echo "No .pkg or .dmg found — skipping notarization"
            exit 0
          fi
          if [ -z "$APPLE_ID" ] || [ -z "$APPLE_APP_PASSWORD" ]; then
            echo "Apple credentials not configured — skipping notarization"
            exit 0
          fi
          xcrun notarytool submit "$PKG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$PKG"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: ./artifacts/macos

  build-windows-msix:
    name: Build Windows MSIX
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          include-prerelease: true

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Decode signing certificate
        env:
          WINDOWS_CERT_PFX: ${{ secrets.WINDOWS_CERT_PFX }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        shell: pwsh
        run: |
          if ($env:WINDOWS_CERT_PFX) {
            $bytes = [Convert]::FromBase64String($env:WINDOWS_CERT_PFX)
            [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\cert.pfx", $bytes)
            Write-Host "Certificate decoded to $env:RUNNER_TEMP\cert.pfx"
          } else {
            Write-Host "No certificate configured — MSIX will be unsigned"
          }

      - name: Publish MSIX
        shell: pwsh
        env:
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          $certArgs = @()
          if (Test-Path "$env:RUNNER_TEMP\cert.pfx") {
            $certArgs = @(
              "-p:PackageCertificateKeyFile=$env:RUNNER_TEMP\cert.pfx",
              "-p:PackageCertificatePassword=$env:WINDOWS_CERT_PASSWORD"
            )
          }
          dotnet publish app/src/Purfle.App/Purfle.App.csproj `
            -f net10.0-windows10.0.19041.0 `
            --configuration Release `
            -p:WindowsPackageType=MSIX `
            --output ./artifacts/msix `
            @certArgs

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msix
          path: ./artifacts/msix/**/*.msix

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-runtime, build-sdk, build-dashboard, build-macos, build-windows-msix]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Archive runtime
        run: tar -czf runtime-${{ github.ref_name }}.tar.gz -C artifacts/runtime .

      - name: Archive dashboard
        run: tar -czf dashboard-${{ github.ref_name }}.tar.gz -C artifacts/dashboard .

      - name: Generate release notes
        id: notes
        run: |
          TAG=${{ github.ref_name }}
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            echo "## Changes since ${PREV_TAG}" > release-notes.md
            echo "" >> release-notes.md
            git log ${PREV_TAG}..${TAG} --pretty=format:"- %s (%h)" >> release-notes.md
          else
            echo "## Initial Release" > release-notes.md
            echo "" >> release-notes.md
            git log --pretty=format:"- %s (%h)" -20 >> release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            runtime-${{ github.ref_name }}.tar.gz
            dashboard-${{ github.ref_name }}.tar.gz
            artifacts/sdk-cli/*.tgz
            artifacts/macos-app/**/*.pkg
            artifacts/macos-app/**/*.dmg
            artifacts/windows-msix/**/*.msix

  deploy-azure:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: [create-release]
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          include-prerelease: true

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Storage Account
        run: |
          az deployment group create \
            --resource-group purfle-rg \
            --template-file infra/storage.bicep \
            --parameters storageAccountName=purflebundlestorage containerName=bundles

      - name: Set Storage Connection String on App Service
        run: |
          CONN_STRING=$(az deployment group show \
            --resource-group purfle-rg \
            --name storage \
            --query properties.outputs.connectionString.value -o tsv 2>/dev/null || echo "")
          if [ -n "$CONN_STRING" ]; then
            az webapp config appsettings set \
              --resource-group purfle-rg \
              --name purfle-marketplace \
              --settings AZURE_STORAGE_CONNECTION_STRING="$CONN_STRING"
          fi

      - name: Publish Marketplace API
        run: >
          dotnet publish marketplace/src/Purfle.Marketplace.Api/Purfle.Marketplace.Api.csproj
          --configuration Release
          --output ./deploy/marketplace

      - name: Deploy Marketplace API
        uses: azure/webapps-deploy@v3
        with:
          app-name: purfle-marketplace
          package: ./deploy/marketplace

      - name: Publish IdentityHub Web
        run: >
          dotnet publish identityhub/src/Purfle.IdentityHub.Web/Purfle.IdentityHub.Web.csproj
          --configuration Release
          --output ./deploy/identityhub-web

      - name: Deploy IdentityHub Web
        uses: azure/webapps-deploy@v3
        with:
          app-name: purfle-identityhub-web
          package: ./deploy/identityhub-web
