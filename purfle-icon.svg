<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <style>
    .icon-bg { fill: #1a1a2e; }
    .outer-ring { fill: none; stroke: #c8a96e; stroke-width: 2.5; }
    .purfle-ring { fill: none; stroke: #e8c878; stroke-width: 5.5; }
    .inner-ring { fill: none; stroke: #c8a96e; stroke-width: 2; }
    .core { fill: #0f3460; }
    .shield-outer { fill: #16213e; stroke: #c8a96e; stroke-width: 2; }
    .shield-inner { fill: none; stroke: #e8c878; stroke-width: 4; }
    .key-line { stroke: #e8c878; stroke-width: 4; stroke-linecap: round; fill: none; }
    .key-dot { fill: #e8c878; }
    .tick { stroke: #c8a96e; stroke-width: 1.5; }
    .tick-major { stroke: #e8c878; stroke-width: 2.5; }
  </style>

  <!-- Background -->
  <rect width="512" height="512" rx="96" class="icon-bg"/>

  <g transform="translate(256, 256)">
    <!-- Outer boundary ring -->
    <circle cx="0" cy="0" r="220" class="outer-ring"/>

    <!-- Minor ticks -->
    <g class="tick">
      <line x1="0" y1="-208" x2="0" y2="-220" transform="rotate(0)"/>
      <line x1="0" y1="-208" x2="0" y2="-220" transform="rotate(15)"/>
      <line x1="0" y1="-208" x2="0" y2="-220" transform="rotate(30)"/>
      <line x1="0" y1="-208" x2="0" y2="-220" transform="rotate(45)"/>
      <line x1="0" y1="-208" x2="0" y2="-220" transform="rotate(60)"/>
      <line x1="0" y1="-208" x2="0" y2="-220" transform="rotate(75)"/>
      <line x1="0" y1="-208" x2="0" y2="-220" transform="rotate(90)"/>
      <line x1="0" y1="-208" x2="0" y2="-220" transform="rotate(105)"/>
      <line x1="0" y1="-208" x2="0" y2="-220" transform="rotate(120)"/>
      <line x1="0" y1="-208" x2="0" y2="-220" transform="rotate(135)"/>
      <line x1="0" y1="-208" x2="0" y2="-220" transform="rotate(150)"/>
      <line x1="0" y1="-208" x2="0" y2="-220" transform="rotate(165)"/>
      <line x1="0" y1="-208" x2="0" y2="-220" transform="rotate(180)"/>
      <line x1="0" y1="-208" x2="0" y2="-220" transform="rotate(195)"/>
      <line x1="0" y1="-208" x2="0" y2="-220" transform="rotate(210)"/>
      <line x1="0" y1="-208" x2="0" y2="-220" transform="rotate(225)"/>
      <line x1="0" y1="-208" x2="0" y2="-220" transform="rotate(240)"/>
      <line x1="0" y1="-208" x2="0" y2="-220" transform="rotate(255)"/>
      <line x1="0" y1="-208" x2="0" y2="-220" transform="rotate(270)"/>
      <line x1="0" y1="-208" x2="0" y2="-220" transform="rotate(285)"/>
      <line x1="0" y1="-208" x2="0" y2="-220" transform="rotate(300)"/>
      <line x1="0" y1="-208" x2="0" y2="-220" transform="rotate(315)"/>
      <line x1="0" y1="-208" x2="0" y2="-220" transform="rotate(330)"/>
      <line x1="0" y1="-208" x2="0" y2="-220" transform="rotate(345)"/>
    </g>
    <!-- Major ticks -->
    <g class="tick-major">
      <line x1="0" y1="-200" x2="0" y2="-220" transform="rotate(0)"/>
      <line x1="0" y1="-200" x2="0" y2="-220" transform="rotate(45)"/>
      <line x1="0" y1="-200" x2="0" y2="-220" transform="rotate(90)"/>
      <line x1="0" y1="-200" x2="0" y2="-220" transform="rotate(135)"/>
      <line x1="0" y1="-200" x2="0" y2="-220" transform="rotate(180)"/>
      <line x1="0" y1="-200" x2="0" y2="-220" transform="rotate(225)"/>
      <line x1="0" y1="-200" x2="0" y2="-220" transform="rotate(270)"/>
      <line x1="0" y1="-200" x2="0" y2="-220" transform="rotate(315)"/>
    </g>

    <!-- THE PURFLE — the inlaid border ring -->
    <circle cx="0" cy="0" r="190" class="purfle-ring"/>
    <circle cx="0" cy="0" r="200" class="inner-ring"/>
    <circle cx="0" cy="0" r="180" class="inner-ring"/>

    <!-- Core -->
    <circle cx="0" cy="0" r="174" class="core"/>

    <!-- Shield -->
    <path d="M0,-115 L86,-57 L86,29 Q86,96 0,125 Q-86,96 -86,29 L-86,-57 Z" class="shield-outer"/>
    <path d="M0,-96 L71,-47 L71,27 Q71,82 0,104 Q-71,82 -71,27 L-71,-47 Z" class="shield-inner"/>

    <!-- Key — cryptographic identity -->
    <circle cx="0" cy="-20" r="27" fill="none" stroke="#e8c878" stroke-width="4.5"/>
    <circle cx="0" cy="-20" r="11" fill="#e8c878"/>
    <line x1="0" y1="7" x2="0" y2="68" class="key-line" stroke-width="4.5"/>
    <line x1="0" y1="36" x2="15" y2="36" class="key-line" stroke-width="3.5"/>
    <line x1="0" y1="52" x2="11" y2="52" class="key-line" stroke-width="3.5"/>

    <!-- Cardinal dots on purfle ring -->
    <circle cx="0" cy="-190" r="5" class="key-dot"/>
    <circle cx="190" cy="0" r="5" class="key-dot"/>
    <circle cx="0" cy="190" r="5" class="key-dot"/>
    <circle cx="-190" cy="0" r="5" class="key-dot"/>
    <!-- Diagonal dots -->
    <circle cx="134" cy="-134" r="3.5" class="key-dot" opacity="0.6"/>
    <circle cx="134" cy="134" r="3.5" class="key-dot" opacity="0.6"/>
    <circle cx="-134" cy="134" r="3.5" class="key-dot" opacity="0.6"/>
    <circle cx="-134" cy="-134" r="3.5" class="key-dot" opacity="0.6"/>
  </g>
</svg>
